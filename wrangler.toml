name = "oneaiworkers"
main = "src/index.ts"
compatibility_date = "2026-06-27"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "OAUTH_DB"
database_name = "oneaiworkers-oauth"

[vars]
HUB_NAME = "OneAIWorkers"
# PUBLIC_BASE_URL is optional. Set it after deploy if your MCP client needs a stable public URL.
# PUBLIC_BASE_URL = "https://oneaiworkers.your-subdomain.workers.dev"

# Optional secrets. Set them with `npx wrangler secret put <NAME>`.
# MCP_SHARED_SECRET        - recommended; protects the OAuth connect page and shared-secret access
# TELEGRAM_BOT_TOKEN       - Telegram Bot API token
# TELEGRAM_CHAT_ID         - default Telegram chat id
# DISCORD_WEBHOOK_URL      - default Discord webhook URL
# SLACK_WEBHOOK_URL        - default Slack webhook URL
# DEFAULT_WEBHOOK_URL      - generic default webhook URL
# CF_ACCOUNT_ID            - only needed for child Worker factory
# CF_API_TOKEN             - only needed for child Worker factory
# CF_WORKERS_DEV_SUBDOMAIN - optional, for expected child workers.dev URLs
