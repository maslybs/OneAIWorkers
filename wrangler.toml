name = "oneaiworkers"
main = "src/index.ts"
compatibility_date = "2026-06-27"
compatibility_flags = ["nodejs_compat"]

[vars]
HUB_NAME = "OneAIWorkers"
# EN: PUBLIC_BASE_URL is optional. Set it after deploy if your MCP client needs a stable public URL.
# UK: PUBLIC_BASE_URL опційний. Задайте його після деплою, якщо MCP-клієнту потрібен стабільний публічний URL.
# PUBLIC_BASE_URL = "https://oneaiworkers.your-subdomain.workers.dev"

# EN: Optional secrets, set with `npx wrangler secret put <NAME>`.
# UK: Опційні secrets, задаються через `npx wrangler secret put <NAME>`.
# MCP_SHARED_SECRET        - EN: simple shared secret for private personal use / UK: простий shared secret для приватного персонального використання
# TELEGRAM_BOT_TOKEN       - EN: Telegram Bot API token / UK: Telegram Bot API token
# TELEGRAM_CHAT_ID         - EN: default Telegram chat id / UK: стандартний Telegram chat id
# DISCORD_WEBHOOK_URL      - EN: default Discord webhook URL / UK: стандартний Discord webhook URL
# SLACK_WEBHOOK_URL        - EN: default Slack webhook URL / UK: стандартний Slack webhook URL
# DEFAULT_WEBHOOK_URL      - EN: generic default webhook URL / UK: стандартний generic webhook URL
# CF_ACCOUNT_ID            - EN: only needed for child Worker factory / UK: потрібен тільки для factory дочірніх Worker
# CF_API_TOKEN             - EN: only needed for child Worker factory / UK: потрібен тільки для factory дочірніх Worker
# CF_WORKERS_DEV_SUBDOMAIN - EN: optional, for expected child workers.dev URLs / UK: опційно, для очікуваних child workers.dev URLs
